name: MailKitBridge

options:
  bundleIdPrefix: com.jdot
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "ATGGQ68RUK"

targets:
  MailKitBridgeApp:
    type: application
    platform: macOS
    # XcodeGen has no `resources:` key — resource files (asset catalogs,
    # privacy manifests) go under `sources:` and are auto-routed to the
    # Resources build phase by file type. Listing them under `resources:`
    # silently drops them from the bundle (no icon, no privacy manifest).
    sources:
      - path: MailKitBridgeApp/Sources
      - path: MailKitBridgeApp/Assets.xcassets
      - path: MailKitBridgeApp/PrivacyInfo.xcprivacy
    dependencies:
      - target: MailKitBridgeExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdot.MailKitBridgeApp
        PRODUCT_NAME: MailKitBridgeApp
        INFOPLIST_FILE: MailKitBridgeApp/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: MailKitBridgeApp/MailKitBridgeApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MailKitBridgeExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MailKitBridgeExtension/Sources
      # Info.plist is consumed via INFOPLIST_FILE below — not bundled as a
      # resource. The privacy manifest must ship in the appex.
      - path: MailKitBridgeExtension/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdot.MailKitBridgeApp.extension
        PRODUCT_NAME: MailKitBridgeExtension
        INFOPLIST_FILE: MailKitBridgeExtension/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: MailKitBridgeExtension/MailKitBridgeExtension.entitlements
