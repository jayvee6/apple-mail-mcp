name: MailKitBridge

options:
  bundleIdPrefix: com.jdot
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "ATGGQ68RUK"

targets:
  MailKitBridgeApp:
    type: application
    platform: macOS
    sources:
      - path: MailKitBridgeApp/Sources
    resources:
      - path: MailKitBridgeApp/Assets.xcassets
      - path: MailKitBridgeApp/PrivacyInfo.xcprivacy
    dependencies:
      - target: MailKitBridgeExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdot.MailKitBridgeApp
        PRODUCT_NAME: MailKitBridgeApp
        INFOPLIST_FILE: MailKitBridgeApp/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: MailKitBridgeApp/MailKitBridgeApp.entitlements

  MailKitBridgeExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MailKitBridgeExtension/Sources
    resources:
      - path: MailKitBridgeExtension/Resources/Info.plist
      - path: MailKitBridgeExtension/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdot.MailKitBridgeApp.extension
        PRODUCT_NAME: MailKitBridgeExtension
        INFOPLIST_FILE: MailKitBridgeExtension/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: MailKitBridgeExtension/MailKitBridgeExtension.entitlements
